name: Test Prisma migrations

on:
  pull_request:
    branches:
      - main
    paths:
      - "prisma/**"
      - "package.json"
      - "package-lock.json"

jobs:
  test-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Neon preview branch
        id: create_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.pull_request.number }}
          database: oak_db
          role: oak
          api_key: ${{ secrets.NEON_API_KEY }}

      - run: echo db_url ${{ steps.create_branch.outputs }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations on preview branch
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}
